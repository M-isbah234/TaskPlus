<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .percentage {
            font-size: 2.5em;
            font-weight: bold;
            color: #48bb78;
        }

        /* Main Content Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        /* Create Task Form */
        .create-task {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .create-task h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            width: 100%;
        }

        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: #fc8181;
        }

        .btn-danger:hover {
            background: #f56565;
        }

        .btn-success {
            background: #48bb78;
        }

        .btn-success:hover {
            background: #38a169;
        }

        /* Task List */
        .task-list {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .task-list h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: #f0f0f0;
            color: #666;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .date-range {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .date-range input {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            flex: 1;
            min-width: 120px;
        }

        .date-range button {
            padding: 8px 15px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Task Cards */
        .tasks {
            display: grid;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .task-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .task-card:hover {
            transform: translateX(5px);
        }

        .task-card.completed {
            border-left-color: #48bb78;
            opacity: 0.8;
        }

        .task-card.overdue {
            border-left-color: #fc8181;
            background: #fff5f5;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .task-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }

        .task-status {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .status-pending {
            background: #fed7d7;
            color: #c53030;
        }

        .status-in-progress {
            background: #feebc8;
            color: #c05621;
        }

        .status-completed {
            background: #c6f6d5;
            color: #22543d;
        }

        .task-description {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: #888;
            margin-bottom: 15px;
        }

        .task-meta i {
            margin-right: 5px;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .task-actions button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .btn-toggle {
            background: #667eea;
            color: white;
        }

        .btn-edit {
            background: #48bb78;
            color: white;
        }

        .btn-delete {
            background: #fc8181;
            color: white;
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📋 Task Manager</h1>
            <p>Organize your tasks, set due dates, and track your progress</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <h3>Total Tasks</h3>
                <div class="number" id="totalTasks">0</div>
            </div>
            <div class="stat-card">
                <h3>Completed</h3>
                <div class="number" id="completedTasks">0</div>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <div class="number" id="pendingTasks">0</div>
            </div>
            <div class="stat-card">
                <h3>Completion Rate</h3>
                <div class="percentage" id="completionRate">0%</div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Left Column - Create Task -->
            <div class="create-task">
                <h2>➕ Create New Task</h2>
                <form id="createTaskForm">
                    <div class="form-group">
                        <label for="title">Title *</label>
                        <input type="text" id="title" required placeholder="Enter task title">
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" placeholder="Enter task description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate">
                    </div>
                    <button type="submit" class="btn">Create Task</button>
                </form>

                <!-- Edit Task Form (Hidden by default) -->
                <div id="editFormContainer" style="display: none; margin-top: 30px;">
                    <h2>✏️ Edit Task</h2>
                    <form id="editTaskForm">
                        <input type="hidden" id="editTaskId">
                        <div class="form-group">
                            <label for="editTitle">Title *</label>
                            <input type="text" id="editTitle" required>
                        </div>
                        <div class="form-group">
                            <label for="editDescription">Description</label>
                            <textarea id="editDescription"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="editStatus">Status</label>
                            <select id="editStatus">
                                <option value="pending">Pending</option>
                                <option value="in-progress">In Progress</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="editDueDate">Due Date</label>
                            <input type="date" id="editDueDate">
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button type="submit" class="btn btn-success" style="flex: 2;">Update Task</button>
                            <button type="button" class="btn btn-danger" style="flex: 1;" onclick="cancelEdit()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Right Column - Task List -->
            <div class="task-list">
                <h2>📌 Your Tasks</h2>
                
                <!-- Filters -->
                <div class="filters">
                    <button class="filter-btn active" onclick="filterTasks(event, 'all')">All</button>
                    <button class="filter-btn" onclick="filterTasks(event, 'pending')">Pending</button>
                    <button class="filter-btn" onclick="filterTasks(event, 'in-progress')">In Progress</button>
                    <button class="filter-btn" onclick="filterTasks(event, 'completed')">Completed</button>
                    <button class="filter-btn" onclick="filterTasks(event, 'overdue')">Overdue</button>
                </div>

                <!-- Date Range Search -->
                <div class="date-range">
                    <input type="date" id="startDate" placeholder="Start Date">
                    <span>to</span>
                    <input type="date" id="endDate" placeholder="End Date">
                    <button onclick="searchByDateRange()">Search</button>
                </div>

                <!-- Tasks Container -->
                <div id="tasksContainer" class="tasks">
                    <!-- Tasks will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Error Message Container -->
    <div id="errorMessage" class="error" style="display: none;"></div>

    <script>
        // API Configuration
        const API_BASE_URL = '';
        
        let currentFilter = 'all';
        let tasks = [];

        // Load tasks on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            loadStats();
        });

        // Create Task Form Handler
        document.getElementById('createTaskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const dueDate = document.getElementById('dueDate').value;

            let url = `${API_BASE_URL}/tasks?title=${encodeURIComponent(title)}`;
            if (description) url += `&description=${encodeURIComponent(description)}`;
            if (dueDate) url += `&due_date=${dueDate}`;

            try {
                const response = await fetch(url, {
                    method: 'POST'
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to create task');
                }

                // Clear form
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                document.getElementById('dueDate').value = '';

                // Reload tasks
                loadTasks();
                loadStats();
                showError('', false);
            } catch (error) {
                showError(error.message);
            }
        });

        // Edit Task Form Handler
        document.getElementById('editTaskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const taskId = document.getElementById('editTaskId').value;
            const title = document.getElementById('editTitle').value;
            const description = document.getElementById('editDescription').value;
            const status = document.getElementById('editStatus').value;
            const dueDate = document.getElementById('editDueDate').value;

            let url = `${API_BASE_URL}/tasks/${taskId}?title=${encodeURIComponent(title)}&description=${encodeURIComponent(description)}&status=${status}`;
            if (dueDate) url += `&due_date=${dueDate}`;

            try {
                const response = await fetch(url, {
                    method: 'PUT'
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to update task');
                }

                // Hide edit form
                cancelEdit();

                // Reload tasks
                loadTasks();
                loadStats();
                showError('', false);
            } catch (error) {
                showError(error.message);
            }
        });

        // Load all tasks
        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE_URL}/tasks`);
                if (!response.ok) throw new Error('Failed to load tasks');
                
                const data = await response.json();
                
                // Convert object to array
                tasks = Object.entries(data).map(([id, task]) => ({
                    id,
                    ...task
                }));
                
                displayTasks();
            } catch (error) {
                showError(error.message);
            }
        }

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/stats`);
                if (!response.ok) throw new Error('Failed to load stats');
                
                const stats = await response.json();
                
                document.getElementById('totalTasks').textContent = stats.total_tasks;
                document.getElementById('completedTasks').textContent = stats.completed;
                document.getElementById('pendingTasks').textContent = stats.pending;
                document.getElementById('completionRate').textContent = stats.completion_rate;
            } catch (error) {
                console.error('Stats error:', error);
            }
        }

        // Display tasks based on current filter
        function displayTasks() {
            const container = document.getElementById('tasksContainer');
            
            if (tasks.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">No tasks yet. Create your first task!</div>';
                return;
            }

            let filteredTasks = tasks;
            
            // Apply filter
            if (currentFilter === 'pending') {
                filteredTasks = tasks.filter(t => t.status === 'pending');
            } else if (currentFilter === 'in-progress') {
                filteredTasks = tasks.filter(t => t.status === 'in-progress');
            } else if (currentFilter === 'completed') {
                filteredTasks = tasks.filter(t => t.status === 'completed');
            } else if (currentFilter === 'overdue') {
                const today = new Date().toISOString().split('T')[0];
                filteredTasks = tasks.filter(t => t.due_date && t.due_date < today && t.status !== 'completed');
            }

            container.innerHTML = filteredTasks.map(task => createTaskCard(task)).join('');
        }

        // Create HTML for a task card
        function createTaskCard(task) {
            const today = new Date().toISOString().split('T')[0];
            const isOverdue = task.due_date && task.due_date < today && task.status !== 'completed';
            
            let statusClass = '';
            if (task.status === 'pending') statusClass = 'status-pending';
            else if (task.status === 'in-progress') statusClass = 'status-in-progress';
            else if (task.status === 'completed') statusClass = 'status-completed';

            return `
                <div class="task-card ${task.status === 'completed' ? 'completed' : ''} ${isOverdue ? 'overdue' : ''}">
                    <div class="task-header">
                        <span class="task-title">${escapeHtml(task.title)}</span>
                        <span class="task-status ${statusClass}">${task.status}</span>
                    </div>
                    <div class="task-description">${escapeHtml(task.description || 'No description')}</div>
                    <div class="task-meta">
                        <span>📅 Due: ${task.due_date || 'No due date'}</span>
                        <span>🕒 Created: ${new Date(task.created_at).toLocaleDateString()}</span>
                    </div>
                    <div class="task-actions">
                        <button class="btn-toggle" onclick="toggleStatus('${task.id}', '${task.status}')">
                            ${task.status === 'completed' ? '↩️ Undo' : '✅ Complete'}
                        </button>
                        <button class="btn-edit" onclick="editTask('${task.id}')">✏️ Edit</button>
                        <button class="btn-delete" onclick="deleteTask('${task.id}')">🗑️ Delete</button>
                    </div>
                </div>
            `;
        }

        // Toggle task status
        async function toggleStatus(taskId, currentStatus) {
            const newStatus = currentStatus === 'completed' ? 'pending' : 'completed';
            
            try {
                const response = await fetch(`${API_BASE_URL}/tasks/${taskId}/status?status=${newStatus}`, {
                    method: 'PATCH'
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to update status');
                }

                loadTasks();
                loadStats();
                showError('', false);
            } catch (error) {
                showError(error.message);
            }
        }

        // Edit task
        function editTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            document.getElementById('editTaskId').value = task.id;
            document.getElementById('editTitle').value = task.title;
            document.getElementById('editDescription').value = task.description || '';
            document.getElementById('editStatus').value = task.status;
            document.getElementById('editDueDate').value = task.due_date || '';

            document.getElementById('editFormContainer').style.display = 'block';
            document.getElementById('createTaskForm').parentElement.scrollIntoView({ behavior: 'smooth' });
        }

        // Cancel edit
        function cancelEdit() {
            document.getElementById('editFormContainer').style.display = 'none';
            document.getElementById('editTaskForm').reset();
        }

        // Delete task
        async function deleteTask(taskId) {
            if (!confirm('Are you sure you want to delete this task?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/tasks/${taskId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to delete task');
                }

                loadTasks();
                loadStats();
                showError('', false);
            } catch (error) {
                showError(error.message);
            }
        }

        // Filter tasks
        function filterTasks(event, filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayTasks();
        }

        // Search by date range
        async function searchByDateRange() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate || !endDate) {
                showError('Please select both start and end dates');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/tasks/by-date-range?start_date=${startDate}&end_date=${endDate}`);
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to search tasks');
                }

                const data = await response.json();
                
                // Convert object to array
                const rangeTasks = Object.entries(data.tasks || {}).map(([id, task]) => ({
                    id,
                    ...task
                }));

                // Temporarily show only range tasks
                const container = document.getElementById('tasksContainer');
                if (rangeTasks.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">No tasks found in this date range</div>';
                } else {
                    container.innerHTML = rangeTasks.map(task => createTaskCard(task)).join('');
                }

                showError('', false);
            } catch (error) {
                showError(error.message);
            }
        }

        // Helper: Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Helper: Show error message
        function showError(message, show = true) {
            const errorDiv = document.getElementById('errorMessage');
            if (show && message) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        }

        // Refresh tasks every 30 seconds
        setInterval(() => {
            loadTasks();
            loadStats();
        }, 30000);
    </script>
</body>
</html>
